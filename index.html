<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn Gujarati Ultra-Inmersivo — Acceso</title>
    <link rel="icon" type="image/x-icon" href="LearnGujarati_SuperInmersivo.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary-color: #ffd700;
            --accent-color: #00ffcc;
            --bg-color: #0d0d0d;
            --surface-color: rgba(22, 22, 22, 0.60);
            --text-muted: #888888;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);

            /* IMAGEN DE FONDO */
            background-image: url('LearnGujarati_SuperInmersivo_Main.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Capa oscura encima de la imagen para que el formulario sea legible */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 36px;
            border-radius: 24px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .level-badge {
            display: inline-block;
            background: #1a1a1a;
            color: var(--primary-color);
            border: 1px solid #333;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: var(--primary-color);
        }

        .login-input::placeholder {
            color: #555;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary-color), #ffa500);
            color: #000;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }

        #login-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 14px;
            display: none;
            line-height: 1.4;
        }

        .footer-text {
            margin-top: 24px;
            color: #444;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>

    <audio id="ambient-audio" loop autoplay src="bazar.mp3"></audio>

    <div class="login-wrapper">
        <form class="login-box" onsubmit="ejecutarLogin(event)">

            <img src="LearnGujarati_SuperInmersivo.ico" alt="Logo" class="logo-img">

            <div class="level-badge">🔐 Sistema Privado</div>
            <h1>Identificación</h1>
            <p class="subtitle">Acceso exclusivo al piloto privado de<br><strong style="color: var(--primary-color);">Gujarati Ultra-Inmersivo</strong></p>

            <input type="text" id="user-input" class="login-input" placeholder="Nombre de Usuario" required autocomplete="username">
            <input type="password" id="pass-input" class="login-input" placeholder="Contraseña" required autocomplete="current-password">

            <button type="submit" class="login-btn">🎭 Ingresar al Teatro</button>

            <p id="login-error"></p>
            <p class="footer-text">Gujarati Ultra-Inmersivo · RubenBhai Pilot</p>
        </form>
    </div>

    <script>
        const BACKEND_URL = "https://gujaratitraining.onrender.com";

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('ambient-audio').play().catch(e => console.log(e));
        });        

        // Si ya tiene sesión activa, saltar el login directamente
        if (sessionStorage.getItem('accessToken')) {
            window.location.href = 'teatro.html';
        }

        function ejecutarLogin(e) {
            e.preventDefault();

            const user = document.getElementById('user-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const errorMsg = document.getElementById('login-error');
            const btn = document.querySelector('.login-btn');

            errorMsg.style.display = "none";
            btn.textContent = "Verificando...";
            btn.disabled = true;

            fetch(`${BACKEND_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => {
                if (!res.ok) throw new Error("Credenciales inválidas");
                return res.json();
            })
            .then(data => {
                if (data.acceso) {
                    sessionStorage.setItem('accessToken', data.token);
                    // Redirigir al teatro
                    window.location.href = 'index.html';
                }
            })
            .catch(() => {
                errorMsg.innerText = "Usuario o contraseña incorrectos, Bhai.";
                errorMsg.style.display = "block";
                btn.textContent = "🎭 Ingresar al Teatro";
                btn.disabled = false;
            });
        }
    </script>

</body>
</html>
